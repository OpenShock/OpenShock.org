on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
    types: [opened, reopened, synchronize]
  workflow_dispatch:

name: ci-build

env:
  ARTIFACT_NAME: openshock-landingpage.zip
  NODE_ENV: production

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26.3.0
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (include dev deps)
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build
        run: pnpm build

      - name: Compress internal artifacts
        run: |
          cd build
          zip -r ${{ env.ARTIFACT_NAME }} .
          cd ..
          mv build/${{ env.ARTIFACT_NAME }} .

      - name: Upload internal artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ github.workspace }}/${{ env.ARTIFACT_NAME }}
          retention-days: 1
