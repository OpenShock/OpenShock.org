on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'
    types: [opened, reopened, synchronize]
  workflow_dispatch:

name: ci-build

env:
  ARTIFACT_NAME: openshock-landingpage.zip
  NODE_ENV: production

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.2.0
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (include dev deps)
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build
        run: pnpm build

      - name: Compress internal artifacts
        run: |
          cd build
          zip -r ${{ env.ARTIFACT_NAME }} .
          cd ..
          mv build/${{ env.ARTIFACT_NAME }} .

      - name: Upload internal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ github.workspace }}/${{ env.ARTIFACT_NAME }}
          retention-days: 1
